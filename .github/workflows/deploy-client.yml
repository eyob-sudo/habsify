name: Deploy Client to Heroku (Second Account)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install-ubuntu.sh | sh

      - name: Deploy Client to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY_CLIENT }}
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME_CLIENT }}
          HEROKU_EMAIL: ${{ secrets.HEROKU_EMAIL_CLIENT }}
        run: |
          # Login to Heroku
          echo "machine api.heroku.com" > ~/.netrc
          echo "login $HEROKU_EMAIL" >> ~/.netrc
          echo "password $HEROKU_API_KEY" >> ~/.netrc
          chmod 600 ~/.netrc

          # Copy only the client folder and deploy
          mkdir -p /tmp/client-deploy
          cp -r client/. /tmp/client-deploy/

          cd /tmp/client-deploy

          # === FIXED PART STARTS HERE ===
          git init
          git checkout -b main                    # removes the "master" warning
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto-deploy from GitHub Actions - ${{ github.sha }}"
          # === FIXED PART ENDS HERE ===

          heroku git:remote -a $HEROKU_APP_NAME
          git push heroku HEAD:main --force